name: GymOS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=60
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: test_secret_key_for_ci_min_32_chars_abc123
          ENVIRONMENT: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend

  # ── Backend Lint ───────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff==0.6.9
      - name: Ruff lint
        run: ruff check app/ --select=E,W,F --ignore=F401,E501
      - name: Ruff format check
        run: ruff format app/ --check

  # ── Frontend Build ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker Build Check ─────────────────────────────────────────────────────
  docker-check:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config --quiet

  # ── Integration (E2E) ──────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gymos
          POSTGRES_PASSWORD: gymos_secret
          POSTGRES_DB: gymos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gymos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run integration tests against real PostgreSQL
        working-directory: backend
        run: pytest tests/ -v --tb=short -k "not websocket"
        env:
          DATABASE_URL: postgresql+asyncpg://gymos:gymos_secret@localhost:5432/gymos_test
          SECRET_KEY: integration_test_secret_key_min_32_chars_abc
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Release Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, docker-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          BACKEND_VER=$(grep 'version="' backend/app/main.py | head -1 | grep -oP '"\K[^"]+')
          FRONTEND_VER=$(jq -r .version frontend/package.json)
          echo "Backend version: $BACKEND_VER"
          echo "Frontend version: $FRONTEND_VER"
          echo "✓ Versions logged"
